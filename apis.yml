aid: inflection-ai
name: Inflection AI
description: >-
  Inflection AI was founded in 2022 by Mustafa Suleyman, Reid Hoffman, and
  Karen Simonyan to build the consumer assistant Pi, backed by Inflection-1,
  Inflection-2, and Inflection-2.5 foundation models. In March 2024 Microsoft
  licensed Inflection's technology for roughly $650M and hired most of the
  founding team into its new AI division, after which Inflection pivoted to an
  enterprise AI lab under CEO Sean White. Today the company markets its
  Inflection-2.5 series and successors to enterprise customers through a
  Conversational API that integrates Inflection models into business
  applications. A developer portal is published at developers.inflection.ai
  with a dashboard, docs, API keys, playground, and usage metering.
